version: '3.8'

services:
  rag-backend:
    image: ghcr.io/${GITHUB_OWNER:-yourusername}/rag-backend:latest
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - HF_EMBEDDING_MODEL=${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - OCI_BUCKET_NAME=${OCI_BUCKET_NAME:-}
      - OCI_NAMESPACE=${OCI_NAMESPACE:-}
      - OCI_REGION=${OCI_REGION:-us-ashburn-1}
      - OCI_USE_INSTANCE_PRINCIPAL=${OCI_USE_INSTANCE_PRINCIPAL:-true}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPOS=${GITHUB_REPOS:-}
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - NOTION_DATABASE_IDS=${NOTION_DATABASE_IDS:-}
    volumes:
      - rag-uploads:/app/uploads
      - rag-chromadb:/app/data/chromadb
      - rag-repos:/app/data/repos
      - rag-db:/app/data/rag.db
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  rag-frontend:
    image: ghcr.io/${GITHUB_OWNER:-yourusername}/rag-frontend:latest
    container_name: rag-frontend
    ports:
      - "80:80"
    depends_on:
      rag-backend:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

networks:
  rag-network:
    driver: bridge

volumes:
  rag-uploads:
  rag-chromadb:
  rag-repos:
  rag-db:
