<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG · Document Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0b0d0f;
      --surface:   #131618;
      --border:    #1e2226;
      --border2:   #2a2f35;
      --accent:    #e8c97a;
      --accent2:   #5b8af0;
      --text:      #d4d8de;
      --muted:     #5a6270;
      --dim:       #2e343c;
      --success:   #4caf82;
      --error:     #e05f5f;
      --radius:    12px;
      --mono:      'DM Mono', monospace;
      --serif:     'DM Serif Display', serif;
      --sans:      'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    .shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      font-family: var(--serif);
      font-size: 20px;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .logo span { color: var(--accent); }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232,201,122,0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
    }

    .drop-icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .drop-label {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    .drop-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .upload-status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-status.loading { background: rgba(91,138,240,0.1); color: var(--accent2); border: 1px solid rgba(91,138,240,0.2); }
    .upload-status.success { background: rgba(76,175,130,0.1); color: var(--success); border: 1px solid rgba(76,175,130,0.2); }
    .upload-status.error   { background: rgba(224,95,95,0.1);  color: var(--error);   border: 1px solid rgba(224,95,95,0.2); }

    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 18px;
    }

    .doc-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }

    .doc-item:last-child { border-bottom: none; }

    .doc-icon {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .doc-icon.pdf { background: rgba(224,95,95,0.15); }
    .doc-icon.json { background: rgba(91,138,240,0.15); }

    .doc-info { flex: 1; min-width: 0; }

    .doc-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .settings-section {
      padding: 16px 18px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .setting-label {
      font-size: 12px;
      color: var(--muted);
    }

    .setting-val {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
    }

    select {
      background: var(--dim);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      outline: none;
    }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-header {
      padding: 20px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-title {
      font-family: var(--serif);
      font-size: 22px;
      color: #fff;
      font-style: italic;
    }

    .clear-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border2);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: var(--error); border-color: var(--error); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }

    .empty-glyph {
      font-size: 48px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--dim);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--muted);
      max-width: 300px;
      text-align: center;
    }

    .msg { display: flex; gap: 14px; animation: slideUp 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .msg.user  .msg-avatar { background: var(--accent);  color: var(--bg); }
    .msg.assistant .msg-avatar { background: var(--dim); color: var(--accent2); }

    .msg-body { max-width: 68%; }
    .msg.user .msg-body { align-items: flex-end; display: flex; flex-direction: column; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: var(--bg);
      border-bottom-right-radius: 3px;
      font-weight: 500;
    }

    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      white-space: pre-wrap;
    }

    .msg-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
    }

    .sources {
      margin-top: 8px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
    }

    .sources-toggle {
      width: 100%;
      background: var(--dim);
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 7px 12px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .sources-toggle:hover { background: var(--border2); color: var(--text); }

    .sources-body {
      background: var(--bg);
    }

    .source-item {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
    }

    .source-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .source-name {
      font-family: var(--mono);
      color: var(--accent2);
      font-size: 11px;
    }

    .source-page {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .source-preview {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      border-left: 2px solid var(--border2);
      padding-left: 8px;
      margin-top: 4px;
      font-family: var(--mono);
    }

    .latency {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 5px;
    }

    .latency-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    .input-bar {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--accent); }

    .query-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
    }

    .query-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      align-self: flex-end;
    }

    .send-btn:hover:not(:disabled) { background: #f5d98a; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-icon { color: var(--bg); font-size: 16px; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    .spin { animation: spin 1s linear infinite; display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// API_BASE will be /api/ when proxied through Nginx in production
// or http://localhost:8000 for local development
const API_BASE = window.location.hostname === 'localhost' 
  ? 'http://localhost:8000' 
  : '/api';

const fmt = (ms) => ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
const now = () => new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
const ext = (name) => (name.split('.').pop() || '').toLowerCase();

function SourcesAccordion({ sources }) {
  const [open, setOpen] = useState(false);
  if (!sources || sources.length === 0) return null;

  return (
    <div className="sources">
      <button className="sources-toggle" onClick={() => setOpen(o => !o)}>
        {open ? '▾' : '▸'} {sources.length} source{sources.length > 1 ? 's' : ''} retrieved
      </button>
      {open && (
        <div className="sources-body">
          {sources.map((s, i) => (
            <div key={i} className="source-item">
              <div className="source-header">
                <span className="source-name">📄 {s.source}</span>
                <span className="source-page">p.{s.page ?? 'N/A'}</span>
              </div>
              <div className="source-preview">{s.preview}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DocItem({ doc }) {
  const type = ext(doc.filename);
  return (
    <div className="doc-item">
      <div className={`doc-icon ${type}`}>
        {type === 'pdf' ? '📕' : '📋'}
      </div>
      <div className="doc-info">
        <div className="doc-name" title={doc.filename}>{doc.filename}</div>
        <div className="doc-meta">{doc.chunks} chunks · {doc.pages_or_records} {type === 'pdf' ? 'pages' : 'records'}</div>
      </div>
    </div>
  );
}

function App() {
  const [messages, setMessages] = useState([]);
  const [docs, setDocs] = useState([]);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [question, setQuestion] = useState('');
  const [loading, setLoading] = useState(false);
  const [topK, setTopK] = useState(5);
  const [temperature, setTemperature] = useState(0);
  const [model, setModel] = useState('gpt-4');
  const [isDragOver, setIsDragOver] = useState(false);

  const messagesRef = useRef(null);
  const inputRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    if (messagesRef.current) {
      messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
    }
  }, [messages, loading]);

  const handleUpload = useCallback(async (file) => {
    if (!file) return;
    const type = ext(file.name);
    if (!['pdf', 'json'].includes(type)) {
      setUploadStatus({ kind: 'error', text: 'Only PDF and JSON supported.' });
      return;
    }

    setUploadStatus({ kind: 'loading', text: `Uploading ${file.name}…` });

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');

      setDocs(prev => [...prev, data]);
      setUploadStatus({ kind: 'success', text: `✓ ${data.filename} · ${data.chunks} chunks indexed` });
      setTimeout(() => setUploadStatus(null), 4000);
    } catch (e) {
      setUploadStatus({ kind: 'error', text: e.message });
    }
  }, []);

  const onFileChange = (e) => handleUpload(e.target.files[0]);

  const onDrop = (e) => {
    e.preventDefault();
    setIsDragOver(false);
    handleUpload(e.dataTransfer.files[0]);
  };

  const sendQuery = async () => {
    const q = question.trim();
    if (!q || loading) return;

    const userMsg = { role: 'user', text: q, time: now() };
    setMessages(prev => [...prev, userMsg]);
    setQuestion('');
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: topK, temperature, model }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Query failed');

      const assistantMsg = {
        role: 'assistant',
        text: data.answer,
        sources: data.sources,
        latency: data.latency_ms,
        time: now(),
      };
      setMessages(prev => [...prev, assistantMsg]);
    } catch (e) {
      setMessages(prev => [...prev, {
        role: 'assistant',
        text: `⚠ Error: ${e.message}`,
        time: now(),
      }]);
    } finally {
      setLoading(false);
      inputRef.current?.focus();
    }
  };

  const onKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  };

  return (
    <div className="shell">
      <header className="topbar">
        <div className="logo">RAG <span>·</span> Document Intelligence</div>
      </header>

      <aside className="sidebar">
        <div className="sidebar-section">
          <div className="section-title">📁 Upload Documents</div>

          <div
            className={`drop-zone ${isDragOver ? 'drag-over' : ''}`}
            onDragOver={e => { e.preventDefault(); setIsDragOver(true); }}
            onDragLeave={() => setIsDragOver(false)}
            onDrop={onDrop}
          >
            <input type="file" accept=".pdf,.json" onChange={onFileChange} ref={fileRef} />
            <span className="drop-icon">⬆</span>
            <div className="drop-label">Drop PDF or JSON</div>
            <div className="drop-sub">or click to browse</div>
          </div>

          {uploadStatus && (
            <div className={`upload-status ${uploadStatus.kind}`}>
              {uploadStatus.kind === 'loading' && <span className="spin">↻</span>}
              {uploadStatus.text}
            </div>
          )}
        </div>

        <div className="doc-list">
          <div className="section-title" style={{marginBottom:10}}>Indexed Documents</div>
          {docs.length === 0 ? (
            <div style={{fontSize:12, color:'var(--muted)', textAlign:'center', padding:'20px 0'}}>
              No documents yet.<br/>Upload a PDF or JSON above.
            </div>
          ) : (
            docs.map((d, i) => <DocItem key={i} doc={d} />)
          )}
        </div>

        <div className="settings-section">
          <div className="section-title" style={{marginBottom:10}}>⚙ Settings</div>

          <div className="setting-row">
            <span className="setting-label">Model</span>
            <select value={model} onChange={e => setModel(e.target.value)}>
              <option value="gpt-4">GPT-4</option>
              <option value="gpt-3.5-turbo">GPT-3.5</option>
            </select>
          </div>

          <div className="setting-row">
            <span className="setting-label">Top-K</span>
            <span className="setting-val">{topK}</span>
          </div>

          <div className="setting-row">
            <span className="setting-label">Temp</span>
            <span className="setting-val">{temperature}</span>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="chat-header">
          <div className="chat-title">Ask your documents</div>
          {messages.length > 0 && (
            <button className="clear-btn" onClick={() => setMessages([])}>
              Clear chat
            </button>
          )}
        </div>

        <div className="messages" ref={messagesRef}>
          {messages.length === 0 && !loading && (
            <div className="empty-state">
              <div className="empty-glyph">⬡</div>
              <div className="empty-title">Nothing here yet</div>
              <div className="empty-sub">
                Upload a PDF or JSON, then ask questions — the AI will ground every answer in your documents.
              </div>
            </div>
          )}

          {messages.map((m, i) => (
            <div key={i} className={`msg ${m.role}`}>
              <div className="msg-avatar">
                {m.role === 'user' ? '↑' : '◈'}
              </div>
              <div className="msg-body">
                <div className="msg-bubble">{m.text}</div>
                {m.role === 'assistant' && (
                  <>
                    {m.latency && (
                      <div className="latency">
                        <div className="latency-dot" />
                        {fmt(m.latency)}
                      </div>
                    )}
                    <SourcesAccordion sources={m.sources} />
                  </>
                )}
                <div className="msg-time">{m.time}</div>
              </div>
            </div>
          ))}

          {loading && (
            <div className="msg assistant">
              <div className="msg-avatar">◈</div>
              <div className="msg-body">
                <div className="msg-bubble">
                  <div className="typing">
                    <span /><span /><span />
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>

        <div className="input-bar">
          <div className="input-wrap">
            <textarea
              ref={inputRef}
              className="query-input"
              placeholder="Ask a question about your documents… (Enter to send)"
              value={question}
              onChange={e => setQuestion(e.target.value)}
              onKeyDown={onKeyDown}
              rows={1}
            />
            <button
              className="send-btn"
              onClick={sendQuery}
              disabled={!question.trim() || loading}
            >
              <span className="send-icon">→</span>
            </button>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
